    /* ─── HELPERS ────────────────────────────────────────────── */
    function stressLevel(score) {
      if (score <= 25) return { label: "Bajo impacto",                       color: "#22c55e" };

      if (score <= 75) return { label: "Estrés afectando tu rendimiento",    color: "#f97316" };
      return              { label: "Estrés crónico severo",                  color: "#ef4444" };

    function barColor(v) {

      return "#ef4444";
    }

    /* ─── HOOKS ──────────────────────────────────────────────── */
    function useCounter(target, duration = 1600, delay = 300) {
      const [val, setVal] = useState(0);
      useEffect(() => {
        const t = setTimeout(() => {
          let start = null;
          const tick = (ts) => {
            if (!start) start = ts;
            const p = Math.min((ts - start) / duration, 1);
            const e = 1 - Math.pow(1 - p, 3); // ease-out cubic
            setVal(Math.round(e * target));
            if (p < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }, delay);
        return () => clearTimeout(t);
      }, [target]);
      return val;
    }

    /* ─── COMPONENTS ─────────────────────────────────────────── */
    function Bar({ value, color, delay = 0 }) {
      const [w, setW] = useState(0);
      useEffect(() => {
        const t = setTimeout(() => setW(value), delay + 150);
        return () => clearTimeout(t);
      }, [value]);
      return (
        <div style={{ height:"10px", borderRadius:"999px", backgroundColor:TRACK_BG, overflow:"hidden" }}>
          <div style={{
            height: "100%", borderRadius: "999px",
            width: `${w}%`, backgroundColor: color,
            transition: "width 1.3s cubic-bezier(0.4,0,0.2,1)"
          }} />
        </div>
      );
    }

    function Gauge({ value, color }) {
      const [animVal, setAnimVal] = useState(0);
      const r = 72;
      const C = 2 * Math.PI * r;
      const offset = C * (1 - animVal / 100);

      useEffect(() => {
        const t = setTimeout(() => setAnimVal(value), 450);
        return () => clearTimeout(t);
      }, [value]);

      return (
        <svg width="200" height="200" viewBox="0 0 200 200" style={{ display:"block" }}>
          <circle cx="100" cy="100" r={r} fill="none" stroke={TRACK_BG} strokeWidth="13" />
          <circle
            cx="100" cy="100" r={r}
            fill="none" stroke={color} strokeWidth="13"
            strokeLinecap="round"
            strokeDasharray={C}
            strokeDashoffset={offset}
            transform="rotate(-90 100 100)"
            style={{ transition:"stroke-dashoffset 1.8s cubic-bezier(0.4,0,0.2,1)" }}
          />
        </svg>
      );
    }

      const ltr = selected ? "#000000" : hov ? "#777" : "#444";
      return (
        <button
          onClick={onClick} disabled={disabled}
          onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{
            width:"100%", textAlign:"left", padding:"14px 16px",
            backgroundColor:bg, border:`1px solid ${bd}`, borderRadius:"4px",
            color:txt, fontSize:"14px", fontWeight:"500",

    /* ─── SCREEN 2 — QUESTIONS ───────────────────────────────── */
    function QuestionsScreen({ onComplete }) {

      const [answers, setAns]   = useState(new Array(15).fill(null));
      const [chosen, setChosen] = useState(null);
      const [fading, setFading] = useState(false);

      const q = QUESTIONS[idx];

      const pick = (val) => {
        if (fading) return;
        setChosen(val);
        setFading(true);
        const next = [...answers];
        next[idx] = val;
        setTimeout(() => {
          if (idx < 14) {
            setAns(next); setIdx(idx + 1);
            setChosen(null); setFading(false);
          } else {
            onComplete(next);
          }
        }, 360);
      };

      return (
        <div style={{

          maxWidth:"580px", margin:"0 auto", padding:"32px 20px 24px"

    /* ─── SCREEN 3 — RESULTS ─────────────────────────────────── */
    function ResultsScreen({ answers }) {

      const sorted = pilarRend

      const w1 = sorted[0];
      const w2 = sorted[1];

      const cEstres    = useCounter(indiceEstres, 1600, 300);

          {/* ── BLOCK 1: Stress Index ── */}

              </div>

              {/* Level + description */}

                <span style={{

                  fontSize:"13px", fontWeight:"700",
                  padding:"6px 12px", borderRadius:"4px",
                  backgroundColor: level.color + "22", color:level.color,
                  marginBottom:"12px"

                  <span style={{
                    width:"8px", height:"8px", borderRadius:"50%",
                    backgroundColor:level.color, flexShrink:0

                </span>
                <p style={{ fontSize:"14px", color:"#aaa", lineHeight:"1.65" }}>
                  Tu índice de estrés crónico es del{" "}
                  <strong style={{ color:"#fff" }}>{indiceEstres}%</strong>.
                  Este número refleja el impacto acumulado del estrés en tu rendimiento diario.
                </p>
              </div>
            </div>
          </Card>

          {/* ── BLOCK 2: Available Performance ── */}
          <Card>
            <Label>Rendimiento Corporal Disponible</Label>
            <div style={{ display:"flex", alignItems:"flex-end", gap:"6px", marginBottom:"10px" }}>
              <span style={{
                fontSize:"clamp(56px,14vw,72px)", fontWeight:"900",
                lineHeight:1, color:ACCENT
              }}>{cRendGlobal}</span>
              <span style={{ fontSize:"24px", color:"#555", fontWeight:"700", marginBottom:"6px" }}>%</span>
            </div>
            <p style={{ fontSize:"14px", color:"#aaa", lineHeight:"1.65" }}>
              Tu cuerpo está funcionando actualmente al{" "}
              <strong style={{ color:"#fff" }}>{rendGlobal}%</strong>{" "}
              de su capacidad potencial.
            </p>
          </Card>

          {/* ── BLOCK 3: Pilar Diagnosis ── */}
          <Card>
            <Label>Diagnóstico por Pilares</Label>
            <div style={{ display:"flex", flexDirection:"column", gap:"20px" }}>
              {PILAR_NAMES.map((name, i) => {
                const v = pilarRend[i];
                const c = barColor(v);
                return (
                  <div key={i}>
                    <div style={{
                      display:"flex", justifyContent:"space-between",
                      alignItems:"center", marginBottom:"8px"
                    }}>
                      <span style={{ fontSize:"13px", fontWeight:"500", color:"#ccc" }}>{name}</span>
                      <span style={{ fontSize:"13px", fontWeight:"700", color:c, tabularNums:true }}>
                        {v}%
                      </span>
                    </div>
                    <Bar value={v} color={c} delay={i * 110} />
                  </div>
                );
              })}
            </div>
          </Card>

          {/* ── BLOCK 4: Interpretation ── */}
          <Card>
            <Label>Interpretación de Tu Diagnóstico</Label>

            {/* Worst 1 */}
            <LimitanteBlock
              rank="Tu principal limitante"
              rankColor="#ef4444"
              rankBg="#ef444420"
              pilarIndex={w1.i}
              rendimiento={w1.r}
            />

            <div style={{ height:"1px", backgroundColor:CARD_BD, margin:"24px 0" }} />

            {/* Worst 2 */}
            <LimitanteBlock
              rank="Tu segundo limitante"
              rankColor="#f97316"
              rankBg="#f9731620"
              pilarIndex={w2.i}
              rendimiento={w2.r}
            />
          </Card>

          {/* ── BLOCK 5: CTA ── */}
          <div style={{
            backgroundColor:"#0c0c0c",
            border:`1px solid ${ACCENT}28`,
            borderRadius:"8px",
            overflow:"hidden"
          }}>

            {/* — Cabecera de sección — */}
            <div style={{
              borderBottom:`1px solid #161616`,
              padding:"28px clamp(20px,4vw,32px) 24px"
            }}>
              <p style={{
                fontSize:"11px", fontWeight:"700", letterSpacing:"0.25em",
                textTransform:"uppercase", color:ACCENT, marginBottom:"12px"
              }}>
                Antes de que cierres esto
              </p>
              <p style={{
                fontSize:"clamp(17px,4vw,20px)", fontWeight:"800",
                color:"#fff", lineHeight:"1.35"
              }}>
                El verdadero problema del estrés es que te va matando silenciosamente.
              </p>
            </div>

            {/* — Copy principal — */}
            <div style={{ padding:"24px clamp(20px,4vw,32px)", borderBottom:`1px solid #161616` }}>
              <div style={{ display:"flex", flexDirection:"column", gap:"16px",
                fontSize:"15px", lineHeight:"1.7" }}>
                <p style={{ color:"#c0c0c0" }}>
                  Un día cualquiera te paras a pensar cómo estabas hace unos meses, y te das cuenta de que
                  ya no eres la misma persona. Te has deteriorado por completo.
                </p>
                <p style={{ color:"#c0c0c0" }}>
                  Tu yo de hace unos meses tenía más energía, más claridad, más capacidad de resolver
                  problemas que tu yo de ahora.
                </p>
                <p style={{ color:"#c0c0c0" }}>
                  Has normalizado estar agotado. Has normalizado no poder conciliar un buen sueño.
                  Has normalizado llegar a casa sin ganas de nada, o hablar mal a tu gente por estar
                  irritado. Has normalizado dejar de salir porque tu trabajo te consume.
                </p>
                <p style={{
                  color:"#fff", fontWeight:"700",
                  padding:"14px 16px", borderRadius:"4px",
                  backgroundColor:"#161616", borderLeft:`3px solid ${ACCENT}`
                }}>
                  Y lo más jodido: has asumido que esto es el precio del éxito.
                </p>
                <p style={{ color:"#c0c0c0" }}>
                  No lo es. Es el precio de que tu cuerpo lleve demasiado tiempo desregulado a nivel
                  hormonal.
                </p>
                <p style={{ color:"#c0c0c0" }}>
                  Y lo peor es que has construido una identidad de persona dura, resistente, que puede
                  con todo. Y no pides ayuda cuando sabes que la necesitas.
                </p>
                <p style={{ color:"#c0c0c0" }}>
                  Cuando las hormonas y sistemas de tu cuerpo no están bien regulados —cortisol,
                  testosterona, sistema dopaminérgico— tu cuerpo es incapaz de soportar el estrés que
                  le das con tu trabajo. La buena noticia es que es un problema fisiológico, y se puede
                  corregir.
                </p>
              </div>
            </div>

            {/* — Bloque de beneficios — */}
            <div style={{ padding:"24px clamp(20px,4vw,32px)", borderBottom:`1px solid #161616` }}>
              <p style={{
                fontSize:"13px", fontWeight:"700", letterSpacing:"0.12em",
                textTransform:"uppercase", color:"#aaa", marginBottom:"16px"
              }}>
                ¿Qué pasaría si en 90 días…
              </p>
              <ul style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
                {[
                  "Tu energía fuera estable de 7am a 9pm sin depender del café",
                  "Volvieras a tomar decisiones con la claridad y velocidad de hace 3 años",
                  "Tu cuerpo mejorara físicamente mientras tu negocio sigue creciendo",
                  "Llegaras a casa con algo real que dar — presencia, energía, ganas",
                  "Volvieras a disfrutar lo que has construido en vez de solo aguantarlo"
                ].map((item, i) => (
                  <li key={i} style={{
                    display:"flex", alignItems:"flex-start", gap:"12px",
                    fontSize:"14px", color:"#c0c0c0", lineHeight:"1.5"
                  }}>
                    <span style={{
                      width:"22px", height:"22px", borderRadius:"50%",
                      backgroundColor:ACCENT + "20", border:`1px solid ${ACCENT}50`,
                      color:ACCENT, fontSize:"11px", fontWeight:"800",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      flexShrink:0, marginTop:"1px"
                    }}>✓</span>
                    <span>{item}</span>
                  </li>
                ))}
              </ul>
            </div>

            {/* — CTA button — */}
            <div style={{ padding:"24px clamp(20px,4vw,32px)" }}>
              <a
                href="https://links.goroprg.com/widget/booking/08g1x2nF4CCm3tJLCFVN"
                target="_blank"
                rel="noopener noreferrer"
                style={{
                  display:"block", width:"100%",
                  padding:"18px 24px", textAlign:"center",
                  backgroundColor:ACCENT, color:"#000",
                  fontSize:"14px", fontWeight:"900",
                  letterSpacing:"0.08em", textTransform:"uppercase",
                  borderRadius:"4px", marginBottom:"14px",
                  transition:"filter 0.15s, transform 0.1s"
                }}
                onMouseEnter={e => e.currentTarget.style.filter = "brightness(1.12)"}
                onMouseLeave={e => e.currentTarget.style.filter = "brightness(1)"}
                onMouseDown={e => e.currentTarget.style.transform = "scale(0.98)"}
                onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
              >
                Quiero ayuda para solucionar mi problema →
              </a>
              <p style={{
                fontSize:"13px", textAlign:"center",
                color:"#e0e0e0", lineHeight:"1.65"
              }}>
                Goro personalmente analizará tu situación y te dirá con claridad si eres el perfil
                apto para trabajar 1a1 con él y solucionar tu problema, no desaproveches la
                oportunidad de poder hablar con un experto...
              </p>
            </div>

          </div>

        </div>
      );
    }

    function LimitanteBlock({ rank, rankColor, rankBg, pilarIndex, rendimiento }) {
      return (
        <div>
          <span style={{
            display:"inline-flex", alignItems:"center", gap:"6px",
            fontSize:"10px", fontWeight:"800", letterSpacing:"0.18em",
            textTransform:"uppercase", padding:"5px 10px", borderRadius:"3px",
            backgroundColor:rankBg, color:rankColor, marginBottom:"10px"
          }}>
            {rank}
          </span>
          <h3 style={{
            fontSize:"15px", fontWeight:"700",
            color:"#fff", marginBottom:"4px"
          }}>
            {PILAR_NAMES[pilarIndex]}
          </h3>
          <p style={{ fontSize:"12px", color:"#444", marginBottom:"8px" }}>
            Rendimiento:{" "}
            <span style={{ fontWeight:"700", color:barColor(rendimiento) }}>
              {rendimiento}%
            </span>
          </p>
          <p style={{ fontSize:"14px", color:"#aaa", lineHeight:"1.7" }}>
            <strong style={{ color:"#fff" }}>
              {rank} es {PILAR_DATA[pilarIndex].subject}.
            </strong>{" "}
            {PILAR_DATA[pilarIndex].body}
          </p>
        </div>
      );
    }

    /* ─── APP ────────────────────────────────────────────────── */
    function App() {
      const [screen,  setScreen]  = useState("intro");
      const [answers, setAnswers] = useState(null);

      return (
        <div style={{ backgroundColor:"#0a0a0a", minHeight:"100vh" }}>
          {screen === "intro" && (
            <IntroScreen onStart={() => setScreen("questions")} />
          )}
          {screen === "questions" && (
            <QuestionsScreen
              onComplete={(a) => { setAnswers(a); setScreen("results"); }}
            />
          )}
          {screen === "results" && answers && (
            <ResultsScreen answers={answers} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
