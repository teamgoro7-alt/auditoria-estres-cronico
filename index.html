      { pilar:4, num:15, text:'¬¨√∏C‚àö‚â•mo describir‚àö‚âÝas tu carga mental diaria?', options:['Manejable, tengo claridad sobre mis prioridades','Algo elevada pero la gestiono','Alta, siento que hay demasiado en mi cabeza','Muy alta, me cuesta priorizar y ejecutar con claridad','Desbordante, vivo en modo reactivo permanente'] }

    var PN = ['Descanso','Nutrici‚àö‚â•n','Entrenamiento','H‚àö¬∞bitos y Biohacking','Planificaci‚àö‚â•n y Organizaci‚àö‚â•n'];

      { subject:'el entrenamiento',  body:'La falta de est‚àö‚âÝmulo f‚àö‚âÝsico estructurado est‚àö¬∞ deteriorando tu capacidad de gestionar el estr‚àö¬©s a nivel fisiol‚àö‚â•gico. Esto provoca: menor resiliencia hormonal, peor calidad del sue‚àö¬±o, acumulaci‚àö‚â•n de tensi‚àö‚â•n sin v‚àö¬∞lvula de escape, deterioro progresivo de la composici‚àö‚â•n corporal.' },

    function stressLevel(s) {
      if (s <= 25) return { label:'Bajo impacto',                      color:'#22c55e' };
      if (s <= 50) return { label:'Estr‚àö¬©s acumulado',             color:'#eab308' };
      if (s <= 75) return { label:'Estr‚àö¬©s afectando tu rendimiento', color:'#f97316' };
      return             { label:'Estr‚àö¬©s cr‚àö‚â•nico severo',   color:'#ef4444' };
    }

    function barColor(v) {
      if (v > 70)  return '#22c55e';
      if (v >= 40) return '#eab308';
      return '#ef4444';
    }

    function animateCount(el, target, duration, delay) {
      if (!el) return;
      setTimeout(function() {
        var start = null;
        function tick(ts) {
          if (!start) start = ts;
          var p = Math.min((ts - start) / duration, 1);
          var e = 1 - Math.pow(1 - p, 3);
          el.textContent = Math.round(e * target);
          if (p < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }, delay);
    }

    var qIdx = 0;

    function mount(html, cb) {

            '</div>' +

    /* ‚Äö√Æ√Ñ‚Äö√Æ√Ñ QUESTIONS ‚Äö√Æ√Ñ‚Äö√Æ√Ñ */
    function showQuestion() {

    /* ‚Äö√Æ√Ñ‚Äö√Æ√Ñ RESULTS ‚Äö√Æ√Ñ‚Äö√Æ√Ñ */

            '</div>' +
          '</div>';
      }

      var beneficios = [
        'Tu energ‚àö‚âÝa fuera estable de 7am a 9pm sin depender del caf‚àö¬©',
        'Volvieras a tomar decisiones con la claridad y velocidad de hace 3 a‚àö¬±os',
        'Tu cuerpo mejorara f‚àö‚âÝsicamente mientras tu negocio sigue creciendo',
        'Llegaras a casa con algo real que dar ‚Äö√Ñ√Æ presencia, energ‚àö‚âÝa, ganas',
        'Volvieras a disfrutar lo que has construido en vez de solo aguantarlo'
